<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<!-- Хедер -->
<header class="header">
    <div class="logo">
        <h1>Notification Center</h1>
    </div>
    <div class="header-icons">
        <button class="icon-btn" id="settingsBtn" aria-label="Настройки">
            <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
            </svg>
        </button>
        <button class="icon-btn" id="profileBtn" aria-label="Профиль">
            <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        </button>
    </div>
</header>

<!-- Три колонки -->
<div class="container">
    <!-- Левая колонка - Календарь -->
    <div class="column">
        <div class="column-header">
            <h2>Календарь</h2>
        </div>
        <div class="column-content">
            <div class="calendar">
                <div class="calendar-header">
                    <button class="nav-btn" id="prevMonthBtn">←</button>
                    <span class="month-title" id="monthTitle">Март 2026</span>
                    <button class="nav-btn" id="nextMonthBtn">→</button>
                </div>
                <div class="weekdays">
                    <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <div class="timeline">
                <h3 class="timeline-title">Сегодняшний день</h3>
                <div class="timeline-hours" id="timelineHours">
                    <!-- Временные слоты будут добавлены через JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Средняя колонка - Письма Gmail -->
    <div class="column">
        <div class="column-header">
            <h2>Письма Gmail</h2>
        </div>
        <div class="column-content">
            <div id="gmailList" class="email-list">
                <div class="loading">Загрузка писем...</div>
            </div>
        </div>
    </div>

    <!-- Правая колонка - Уведомления -->
    <div class="column">
        <div class="column-header">
            <h2>Уведомления</h2>
        </div>
        <div class="column-content">
            <div id="notificationsList" class="notifications-list">
                <div class="empty-state">Нет уведомлений</div>
            </div>
        </div>
    </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
